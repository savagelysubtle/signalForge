<svg xmlns="http://www.w3.org/2000/svg" width="640" height="180" viewBox="0 0 640 180" fill="none">
  <defs>
    <linearGradient id="brandGradient" x1="32" y1="132" x2="119" y2="42" gradientUnits="userSpaceOnUse">
      <stop stop-color="#9B5CFF" />
      <stop offset="0.55" stop-color="#7C8DFF" />
      <stop offset="1" stop-color="#7CEBFF" />
    </linearGradient>
    <linearGradient id="metalGradient" x1="35" y1="132" x2="118" y2="44" gradientUnits="userSpaceOnUse">
